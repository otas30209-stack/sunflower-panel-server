services:
  - type: web
    name: sunflower-panel-server
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: ADMIN_TOKEN
        sync: false
      - key: SERVER_LICENSE_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: ADMIN_ALLOWED_IPS
        value: ""
      - key: SESSION_TTL_SECONDS
        value: "21600"
      - key: ADMIN_RATE_LIMIT_PER_MIN
        value: "120"
      - key: AUTH_RATE_LIMIT_PER_MIN
        value: "240"
